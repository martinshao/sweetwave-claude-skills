<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1360" viewBox="0 0 1680 1360" role="img" aria-labelledby="title desc">
  <title id="title">SweetWave Workflow 最新工作状态流转图</title>
  <desc id="desc">展示 SweetWave 分阶段命令、可选 sw-run 状态机、任务状态、验证质量门、审查质量门、LESSONS 长期记忆、发布与复盘的完整流转。</desc>
  <defs>
    <style>
      .bg { fill: #f7f5ef; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52616b; }
      .lane { fill: #ffffff; stroke: #d8dee9; stroke-width: 1.5; rx: 18; }
      .lane-title { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #243b53; }
      .node { fill: #ffffff; stroke: #9fb3c8; stroke-width: 2; rx: 14; }
      .product { fill: #fff8e6; stroke: #d69e2e; }
      .spec { fill: #eef7ff; stroke: #2f80ed; }
      .dev { fill: #effcf6; stroke: #2f9e44; }
      .gate { fill: #fff0f0; stroke: #e03131; }
      .memory { fill: #edf7f2; stroke: #087f5b; }
      .release { fill: #f3f0ff; stroke: #7048e8; }
      .side { fill: #edf2f7; stroke: #829ab1; }
      .node-title { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .node-sub { font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52616b; }
      .cmd { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334e68; }
      .small { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #627d98; }
      .label { fill: #f7f5ef; stroke: #d8dee9; stroke-width: 1; rx: 9; }
      .label-text { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334e68; }
      .arrow { fill: none; stroke: #486581; stroke-width: 2.3; marker-end: url(#arrow); }
      .soft { fill: none; stroke: #829ab1; stroke-width: 2; stroke-dasharray: 8 7; marker-end: url(#soft); }
      .ok { fill: none; stroke: #2f9e44; stroke-width: 2.3; marker-end: url(#ok); }
      .warn { fill: none; stroke: #e03131; stroke-width: 2.3; marker-end: url(#warn); }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#486581"/>
    </marker>
    <marker id="soft" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#829ab1"/>
    </marker>
    <marker id="ok" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f9e44"/>
    </marker>
    <marker id="warn" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#e03131"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1680" height="1360"/>

  <text class="title" x="72" y="70">SweetWave Workflow 最新工作状态流转图</text>
  <text class="subtitle" x="72" y="102">保留清晰分阶段命令；引入 /sw-run 状态机、断点恢复、验证质量门、审查质量门和 LESSONS 长期记忆。</text>

  <rect class="lane" x="54" y="136" width="1572" height="170"/>
  <text class="lane-title" x="84" y="174">0. 接入与观察</text>

  <rect class="node side" x="96" y="205" width="210" height="72"/>
  <text class="node-title" x="118" y="232">帮助</text>
  <text class="cmd" x="118" y="255">/sw-help</text>

  <rect class="node spec" x="410" y="205" width="250" height="72"/>
  <text class="node-title" x="432" y="232">初始化项目</text>
  <text class="cmd" x="432" y="255">/sw-init</text>

  <rect class="node side" x="1265" y="205" width="250" height="72"/>
  <text class="node-title" x="1287" y="232">状态检查</text>
  <text class="cmd" x="1287" y="255">/sw-status</text>

  <path class="arrow" d="M306 241 C340 241, 370 241, 410 241"/>
  <path class="soft" d="M660 241 C845 150, 1080 150, 1265 230"/>

  <rect class="lane" x="54" y="336" width="1572" height="250"/>
  <text class="lane-title" x="84" y="374">1. 文档先行主线</text>

  <rect class="node product" x="96" y="425" width="190" height="86"/>
  <text class="node-title" x="118" y="454">产品简报</text>
  <text class="cmd" x="118" y="477">/sw-brief</text>
  <text class="node-sub" x="118" y="498">想法收敛</text>

  <rect class="node product" x="355" y="425" width="200" height="86"/>
  <text class="node-title" x="377" y="454">PRD</text>
  <text class="cmd" x="377" y="477">/sw-prd</text>
  <text class="node-sub" x="377" y="498">F/AC 编号</text>

  <rect class="node product" x="625" y="425" width="210" height="86"/>
  <text class="node-title" x="647" y="454">模块地图</text>
  <text class="cmd" x="647" y="477">/sw-map</text>
  <text class="node-sub" x="647" y="498">MODULE_MAP / specs</text>

  <rect class="node spec" x="905" y="425" width="220" height="86"/>
  <text class="node-title" x="927" y="454">模块设计</text>
  <text class="cmd" x="927" y="477">/sw-design [module]</text>
  <text class="node-sub" x="927" y="498">DESIGN.md</text>

  <rect class="node spec" x="1195" y="425" width="220" height="86"/>
  <text class="node-title" x="1217" y="454">界面原型</text>
  <text class="cmd" x="1217" y="477">/sw-ui [module]</text>
  <text class="node-sub" x="1217" y="498">UI.md</text>

  <rect class="node spec" x="1465" y="425" width="110" height="86"/>
  <text class="node-title" x="1485" y="454">架构规格</text>
  <text class="cmd" x="1485" y="477">/sw-arch</text>
  <text class="node-sub" x="1485" y="498">/sw-spec/task</text>

  <rect class="node gate" x="350" y="526" width="300" height="38"/>
  <text class="small" x="372" y="550">高风险歧义：先确认，再继续</text>

  <path class="arrow" d="M286 468 C315 468, 328 468, 355 468"/>
  <path class="arrow" d="M555 468 C585 468, 595 468, 625 468"/>
  <path class="arrow" d="M835 468 C865 468, 875 468, 905 468"/>
  <path class="arrow" d="M1125 468 C1155 468, 1165 468, 1195 468"/>
  <path class="arrow" d="M1415 468 C1435 468, 1445 468, 1465 468"/>
  <path class="warn" d="M455 511 C455 520, 455 522, 455 526"/>
  <path class="warn" d="M650 545 C700 545, 700 395, 455 395 C385 395, 365 405, 355 425"/>

  <rect class="lane" x="54" y="616" width="1572" height="285"/>
  <text class="lane-title" x="84" y="654">2. 任务状态与执行入口</text>

  <rect class="node side" x="100" y="708" width="245" height="112"/>
  <text class="node-title" x="122" y="737">TASKS.md 状态源</text>
  <text class="node-sub" x="122" y="762">[ ] / [NEW] / [CHANGED]</text>
  <text class="node-sub" x="122" y="784">[x] / [DROPPED]</text>

  <rect class="node side" x="420" y="708" width="215" height="112"/>
  <text class="node-title" x="442" y="737">跳过</text>
  <text class="node-sub" x="442" y="762">[x] 已完成</text>
  <text class="node-sub" x="442" y="784">[DROPPED] 已废弃</text>

  <rect class="node dev" x="710" y="688" width="250" height="72"/>
  <text class="node-title" x="732" y="717">手动单任务</text>
  <text class="cmd" x="732" y="740">/sw-work TASK-ID</text>

  <rect class="node dev" x="710" y="790" width="250" height="72"/>
  <text class="node-title" x="732" y="819">状态机执行</text>
  <text class="cmd" x="732" y="842">/sw-run TASK-ID / --all</text>

  <rect class="node gate" x="1050" y="688" width="230" height="72"/>
  <text class="node-title" x="1072" y="717">暂停确认</text>
  <text class="node-sub" x="1072" y="740">业务 / 安全 / 破坏性</text>

  <rect class="node dev" x="1355" y="738" width="220" height="72"/>
  <text class="node-title" x="1377" y="767">实现任务</text>
  <text class="node-sub" x="1377" y="790">计划后最小改动</text>

  <path class="arrow" d="M1575 468 C1610 500, 1610 645, 345 645 C230 645, 222 680, 222 708"/>
  <path class="arrow" d="M345 750 C375 750, 390 750, 420 750"/>
  <path class="arrow" d="M345 774 C500 774, 570 720, 710 720"/>
  <path class="arrow" d="M345 792 C505 830, 575 825, 710 825"/>
  <path class="warn" d="M960 724 C995 724, 1015 724, 1050 724"/>
  <path class="ok" d="M1280 724 C1310 724, 1325 760, 1355 760"/>
  <path class="arrow" d="M960 825 C1120 825, 1225 775, 1355 775"/>

  <rect class="lane" x="54" y="930" width="1572" height="245"/>
  <text class="lane-title" x="84" y="968">3. 质量门、完成标记与长期记忆</text>

  <rect class="node gate" x="115" y="1025" width="225" height="82"/>
  <text class="node-title" x="137" y="1054">验证质量门</text>
  <text class="cmd" x="137" y="1077">/sw-verify</text>

  <rect class="node gate" x="430" y="1025" width="225" height="82"/>
  <text class="node-title" x="452" y="1054">审查质量门</text>
  <text class="cmd" x="452" y="1077">/sw-review</text>

  <rect class="node spec" x="745" y="1025" width="225" height="82"/>
  <text class="node-title" x="767" y="1054">标记完成</text>
  <text class="node-sub" x="767" y="1077">TASK 状态写入 [x]</text>

  <rect class="node memory" x="1060" y="1025" width="225" height="82"/>
  <text class="node-title" x="1082" y="1054">长期记忆</text>
  <text class="cmd" x="1082" y="1077">LESSONS.md</text>

  <rect class="node side" x="1375" y="1025" width="170" height="82"/>
  <text class="node-title" x="1397" y="1054">还有任务?</text>
  <text class="node-sub" x="1397" y="1077">是：回到状态源</text>

  <path class="arrow" d="M1465 810 C1465 900, 228 900, 228 1025"/>
  <path class="ok" d="M340 1066 C370 1066, 400 1066, 430 1066"/>
  <path class="ok" d="M655 1066 C685 1066, 715 1066, 745 1066"/>
  <path class="ok" d="M970 1066 C1000 1066, 1030 1066, 1060 1066"/>
  <path class="ok" d="M1285 1066 C1315 1066, 1345 1066, 1375 1066"/>
  <path class="warn" d="M228 1107 C228 1150, 1465 1150, 1465 810"/>
  <rect class="label" x="292" y="1127" width="235" height="30"/>
  <text class="label-text" x="312" y="1147">验证失败 / 审查阻塞：返工</text>
  <path class="soft" d="M1460 1107 C1460 1200, 222 1200, 222 820"/>
  <rect class="label" x="1275" y="1178" width="190" height="30"/>
  <text class="label-text" x="1295" y="1198">继续下一个任务</text>

  <rect class="lane" x="54" y="1212" width="1572" height="105"/>
  <text class="lane-title" x="84" y="1250">4. 发布、复盘与下一轮</text>

  <rect class="node release" x="450" y="1268" width="230" height="42"/>
  <text class="cmd" x="472" y="1295">/sw-release v0.1.0</text>

  <rect class="node release" x="780" y="1268" width="220" height="42"/>
  <text class="cmd" x="802" y="1295">/sw-retro v0.1.0</text>

  <path class="arrow" d="M1545 1066 C1610 1120, 1420 1288, 680 1288"/>
  <path class="arrow" d="M680 1288 C715 1288, 745 1288, 780 1288"/>
  <path class="soft" d="M1000 1288 C1320 1288, 1550 1160, 1550 480 C1550 370, 230 350, 191 425"/>
  <text class="small" x="72" y="1342">项目产物：CLAUDE.md、.wave/brief、.wave/prd、.wave/MODULE_MAP.md、.wave/specs、.wave/release、.wave/retro、.wave/LESSONS.md。/sw-status 可在任意阶段观察进度和建议下一步。</text>
</svg>
