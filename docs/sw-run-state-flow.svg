<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1180" viewBox="0 0 1680 1180" role="img" aria-labelledby="title desc">
  <title id="title">/sw-run 工作状态流转图</title>
  <desc id="desc">展示 /sw-run 从解析执行范围、选择模块任务、识别任务状态、计划确认、实现、验证质量门、审查质量门、标记完成、记录 LESSONS 到继续下一个任务或结束的完整状态机。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18212f; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52616b; }
      .lane { fill: #ffffff; stroke: #d8dee9; stroke-width: 1.5; rx: 16; }
      .lane-title { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #243b53; }
      .node { fill: #ffffff; stroke: #9fb3c8; stroke-width: 2; rx: 12; }
      .start { fill: #effcf6; stroke: #2f9e44; }
      .scope { fill: #eef7ff; stroke: #2f80ed; }
      .state { fill: #fff8e6; stroke: #d69e2e; }
      .work { fill: #f3f0ff; stroke: #7048e8; }
      .gate { fill: #fff0f0; stroke: #e03131; }
      .done { fill: #edf7f2; stroke: #087f5b; }
      .side { fill: #edf2f7; stroke: #829ab1; }
      .node-title { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .node-sub { font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52616b; }
      .cmd { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334e68; }
      .path { font: 700 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334e68; }
      .small { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #627d98; }
      .edge-label { fill: #f8fafc; stroke: #d8dee9; stroke-width: 1; rx: 8; }
      .edge-text { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334e68; }
      .arrow { fill: none; stroke: #486581; stroke-width: 2.4; marker-end: url(#arrow); }
      .soft { fill: none; stroke: #829ab1; stroke-width: 2; stroke-dasharray: 8 7; marker-end: url(#soft); }
      .ok { fill: none; stroke: #2f9e44; stroke-width: 2.4; marker-end: url(#ok); }
      .warn { fill: none; stroke: #e03131; stroke-width: 2.4; marker-end: url(#warn); }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#486581"/>
    </marker>
    <marker id="soft" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#829ab1"/>
    </marker>
    <marker id="ok" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f9e44"/>
    </marker>
    <marker id="warn" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#e03131"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1680" height="1180"/>

  <text class="title" x="72" y="70">/sw-run 工作状态流转图</text>
  <text class="subtitle" x="72" y="102">模块化 .wave 工作区中的可恢复任务状态机：解析范围，推进 TASKS.md，经过验证和审查质量门后才写入 [x]。</text>

  <rect class="lane" x="54" y="138" width="1572" height="180"/>
  <text class="lane-title" x="84" y="176">1. 初始化上下文与执行范围</text>

  <rect class="node start" x="100" y="214" width="190" height="72"/>
  <text class="node-title" x="122" y="242">开始</text>
  <text class="cmd" x="122" y="265">/sw-run</text>

  <rect class="node scope" x="390" y="204" width="250" height="92"/>
  <text class="node-title" x="412" y="231">N1 初始化上下文</text>
  <text class="path" x="412" y="255">.wave/MODULE_MAP.md</text>
  <text class="path" x="412" y="275">.wave/LESSONS.md</text>

  <rect class="node scope" x="745" y="184" width="280" height="132"/>
  <text class="node-title" x="767" y="212">解析执行范围</text>
  <text class="node-sub" x="767" y="238">无参数：全模块下一个任务</text>
  <text class="node-sub" x="767" y="260">{module}：指定模块下一个任务</text>
  <text class="node-sub" x="767" y="282">TASK-ID：全模块唯一匹配</text>
  <text class="node-sub" x="767" y="304">--all：连续执行所有未完成任务</text>

  <rect class="node scope" x="1135" y="204" width="280" height="92"/>
  <text class="node-title" x="1157" y="231">N2 定位任务</text>
  <text class="path" x="1157" y="255">.wave/specs/{module}/TASKS.md</text>
  <text class="node-sub" x="1157" y="276">按依赖与状态选择任务</text>

  <path class="arrow" d="M290 250 C322 250, 355 250, 390 250"/>
  <path class="arrow" d="M640 250 C675 250, 710 250, 745 250"/>
  <path class="arrow" d="M1025 250 C1060 250, 1100 250, 1135 250"/>

  <rect class="lane" x="54" y="354" width="1572" height="250"/>
  <text class="lane-title" x="84" y="392">2. 任务状态分流</text>

  <rect class="node state" x="120" y="440" width="250" height="112"/>
  <text class="node-title" x="142" y="468">读取任务状态</text>
  <text class="node-sub" x="142" y="494">[ ] / [NEW] / [CHANGED]</text>
  <text class="node-sub" x="142" y="517">[x] / [DROPPED]</text>

  <rect class="node side" x="475" y="418" width="230" height="78"/>
  <text class="node-title" x="497" y="447">跳过任务</text>
  <text class="node-sub" x="497" y="470">[x] 或 [DROPPED]</text>

  <rect class="node work" x="475" y="520" width="230" height="78"/>
  <text class="node-title" x="497" y="549">进入计划</text>
  <text class="node-sub" x="497" y="572">[ ] / [NEW] / [CHANGED]</text>

  <rect class="node side" x="815" y="418" width="250" height="180"/>
  <text class="node-title" x="837" y="446">还有可执行任务?</text>
  <text class="node-sub" x="837" y="474">是：回到 N2</text>
  <text class="node-sub" x="837" y="499">否：进入总结</text>
  <text class="node-sub" x="837" y="528">--all 模式会持续循环</text>
  <text class="node-sub" x="837" y="553">单任务模式完成后结束</text>

  <rect class="node done" x="1200" y="450" width="220" height="86"/>
  <text class="node-title" x="1222" y="479">N8 输出总结</text>
  <text class="node-sub" x="1222" y="503">结果 / 验证 / 风险</text>
  <text class="node-sub" x="1222" y="524">下一步建议</text>

  <path class="arrow" d="M1275 296 C1275 342, 245 342, 245 440"/>
  <path class="soft" d="M370 472 C405 455, 440 455, 475 455"/>
  <path class="arrow" d="M370 520 C405 548, 440 558, 475 558"/>
  <path class="soft" d="M705 456 C740 456, 780 456, 815 456"/>
  <path class="arrow" d="M1065 492 C1105 492, 1160 492, 1200 492"/>
  <path class="soft" d="M940 418 C940 350, 1275 350, 1275 296"/>

  <rect class="lane" x="54" y="640" width="1572" height="270"/>
  <text class="lane-title" x="84" y="678">3. 角色派发、确认与实现</text>

  <rect class="node work" x="120" y="738" width="250" height="96"/>
  <text class="node-title" x="142" y="766">N3 解析角色</text>
  <text class="node-sub" x="142" y="791">选择 Engineer Skill</text>
  <text class="node-sub" x="142" y="813">记录调用输入与派发状态</text>

  <rect class="node gate" x="480" y="724" width="230" height="124"/>
  <text class="node-title" x="502" y="752">需要确认?</text>
  <text class="node-sub" x="502" y="778">业务矛盾</text>
  <text class="node-sub" x="502" y="800">安全/隐私/破坏性</text>
  <text class="node-sub" x="502" y="822">新增依赖或扩大范围</text>

  <rect class="node gate" x="815" y="724" width="220" height="124"/>
  <text class="node-title" x="837" y="752">暂停确认</text>
  <text class="node-sub" x="837" y="778">等待用户确认</text>
  <text class="node-sub" x="837" y="800">确认后继续</text>
  <text class="node-sub" x="837" y="822">拒绝则停止或重规划</text>

  <rect class="node work" x="1150" y="738" width="250" height="96"/>
  <text class="node-title" x="1172" y="766">Skill 调用 Engineer</text>
  <text class="node-sub" x="1172" y="791">结构化返回执行结果</text>
  <text class="node-sub" x="1172" y="813">失败阻塞，不降级 generic</text>

  <path class="arrow" d="M590 598 C590 645, 245 645, 245 738"/>
  <path class="arrow" d="M370 786 C405 786, 445 786, 480 786"/>
  <path class="warn" d="M710 770 C745 770, 780 770, 815 770"/>
  <rect class="edge-label" x="735" y="735" width="58" height="28"/>
  <text class="edge-text" x="751" y="754">是</text>
  <path class="ok" d="M710 815 C860 895, 1035 815, 1150 800"/>
  <rect class="edge-label" x="745" y="837" width="58" height="28"/>
  <text class="edge-text" x="761" y="856">否</text>
  <path class="ok" d="M1035 786 C1070 786, 1115 786, 1150 786"/>

  <rect class="lane" x="54" y="946" width="1572" height="178"/>
  <text class="lane-title" x="84" y="984">4. 质量门、完成状态与回环</text>

  <rect class="node gate" x="115" y="1030" width="220" height="72"/>
  <text class="node-title" x="137" y="1058">N4 验收派发结果</text>
  <text class="node-sub" x="137" y="1081">RESULT_VALIDATED / diff / 范围</text>

  <rect class="node gate" x="440" y="1030" width="220" height="72"/>
  <text class="node-title" x="462" y="1058">N5 验证质量门</text>
  <text class="node-sub" x="462" y="1081">test / lint / typecheck / build</text>

  <rect class="node done" x="765" y="1030" width="220" height="72"/>
  <text class="node-title" x="787" y="1058">N6 Review</text>
  <text class="node-sub" x="787" y="1081">correctness / 风险 / 边界</text>

  <rect class="node done" x="1090" y="1030" width="220" height="72"/>
  <text class="node-title" x="1112" y="1058">N7 QA / Security</text>
  <text class="path" x="1112" y="1081">通过 Skill 工具调用专项角色</text>

  <rect class="node side" x="1390" y="1030" width="170" height="72"/>
  <text class="node-title" x="1412" y="1058">范围完成?</text>
  <text class="node-sub" x="1412" y="1081">Continue / Stop / N10</text>

  <path class="arrow" d="M1275 834 C1275 925, 225 925, 225 1030"/>
  <path class="ok" d="M335 1066 C370 1066, 405 1066, 440 1066"/>
  <path class="ok" d="M660 1066 C695 1066, 730 1066, 765 1066"/>
  <path class="ok" d="M985 1066 C1020 1066, 1055 1066, 1090 1066"/>
  <path class="ok" d="M1310 1066 C1340 1066, 1360 1066, 1390 1066"/>
  <path class="warn" d="M225 1102 C225 1145, 1275 1145, 1275 834"/>
  <rect class="edge-label" x="275" y="1128" width="260" height="30"/>
  <text class="edge-text" x="295" y="1148">验证失败 / 审查阻塞：修复后重跑</text>
  <path class="soft" d="M1475 1030 C1475 945, 1275 930, 1275 296"/>
  <rect class="edge-label" x="1285" y="918" width="180" height="30"/>
  <text class="edge-text" x="1305" y="938">范围内有任务：回到 N2</text>
  <path class="arrow" d="M1560 1066 C1605 1066, 1605 492, 1420 492"/>
  <rect class="edge-label" x="1498" y="585" width="110" height="30"/>
  <text class="edge-text" x="1518" y="605">项目 --all 完成：N10</text>

  <text class="small" x="72" y="1160">关键约束：调度只看当前范围；单任务和模块范围完成后停止，仅项目级 --all 进入 N10 与 READY_TO_RELEASE。</text>
</svg>
