<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1180" viewBox="0 0 1680 1180" role="img" aria-labelledby="title desc">
  <title id="title">SweetWave 断点记忆与恢复流程</title>
  <desc id="desc">展示 sw-plan 建立 READY_TO_RUN 与前端骨架快照，以及 sw-run 跨会话校验状态、Git 和物料基线后恢复 scaffold 或普通任务的流程。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18212f; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52616b; }
      .lane { fill: #ffffff; stroke: #d8dee9; stroke-width: 1.5; rx: 16; }
      .lane-title { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #243b53; }
      .node { fill: #ffffff; stroke: #9fb3c8; stroke-width: 2; rx: 12; }
      .prepare { fill: #eef7ff; stroke: #2f80ed; }
      .memory { fill: #f3f0ff; stroke: #7048e8; }
      .check { fill: #fff8e6; stroke: #d69e2e; }
      .run { fill: #effcf6; stroke: #2f9e44; }
      .blocked { fill: #fff0f0; stroke: #e03131; }
      .done { fill: #edf7f2; stroke: #087f5b; }
      .node-title { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .node-sub { font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52616b; }
      .cmd { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334e68; }
      .path { font: 700 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334e68; }
      .small { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #627d98; }
      .arrow { fill: none; stroke: #486581; stroke-width: 2.3; marker-end: url(#arrow); }
      .soft { fill: none; stroke: #829ab1; stroke-width: 2; stroke-dasharray: 8 7; marker-end: url(#soft); }
      .ok { fill: none; stroke: #2f9e44; stroke-width: 2.3; marker-end: url(#ok); }
      .warn { fill: none; stroke: #e03131; stroke-width: 2.3; marker-end: url(#warn); }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#486581"/>
    </marker>
    <marker id="soft" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#829ab1"/>
    </marker>
    <marker id="ok" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f9e44"/>
    </marker>
    <marker id="warn" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#e03131"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1680" height="1180"/>
  <text class="title" x="72" y="70">SweetWave 断点记忆与恢复流程</text>
  <text class="subtitle" x="72" y="102">跨会话恢复不依赖聊天历史：由 STATUS.md、TASKS.md、RUN_STATE.md 与 Git 现场共同确定下一步。</text>

  <rect class="lane" x="54" y="138" width="1572" height="220"/>
  <text class="lane-title" x="84" y="176">1. 文档阶段完成：建立可执行快照</text>

  <rect class="node prepare" x="100" y="220" width="220" height="94"/>
  <text class="node-title" x="122" y="248">规划交接完成</text>
  <text class="cmd" x="122" y="272">/sw-plan P10</text>
  <text class="node-sub" x="122" y="294">生成模块与 scaffold 任务</text>

  <rect class="node check" x="415" y="204" width="260" height="126"/>
  <text class="node-title" x="437" y="232">物料完整性检查</text>
  <text class="node-sub" x="437" y="258">MODULE / DESIGN / UI</text>
  <text class="node-sub" x="437" y="280">ARCH / SPEC / TASKS</text>
  <text class="node-sub" x="437" y="302">记录 SHA-256 或 Git 基线</text>

  <rect class="node memory" x="770" y="194" width="290" height="146"/>
  <text class="node-title" x="792" y="222">写入项目快照</text>
  <text class="path" x="792" y="247">.wave/STATUS.md</text>
  <text class="node-sub" x="792" y="271">阶段：READY_TO_RUN</text>
  <text class="node-sub" x="792" y="293">前端骨架：PENDING / NOT_REQUIRED</text>
  <text class="node-sub" x="792" y="315">下一步：/sw-scaffold 或 /sw-run</text>

  <rect class="node memory" x="1155" y="204" width="290" height="126"/>
  <text class="node-title" x="1177" y="232">初始化执行现场</text>
  <text class="path" x="1177" y="257">.wave/RUN_STATE.md</text>
  <text class="node-sub" x="1177" y="281">状态：IDLE</text>
  <text class="node-sub" x="1177" y="303">尚无活动任务</text>

  <path class="arrow" d="M320 267 C350 267, 385 267, 415 267"/>
  <path class="arrow" d="M675 267 C705 267, 740 267, 770 267"/>
  <path class="arrow" d="M1060 267 C1090 267, 1125 267, 1155 267"/>

  <rect class="lane" x="54" y="394" width="1572" height="260"/>
  <text class="lane-title" x="84" y="432">2. 隔段时间重新进入：先恢复上下文，再选择动作</text>

  <rect class="node run" x="90" y="492" width="210" height="86"/>
  <text class="node-title" x="112" y="520">重新启动</text>
  <text class="cmd" x="112" y="546">/sw-scaffold 或 /sw-run</text>

  <rect class="node memory" x="380" y="470" width="260" height="130"/>
  <text class="node-title" x="402" y="498">读取三层记忆</text>
  <text class="path" x="402" y="523">STATUS.md</text>
  <text class="path" x="402" y="546">TASKS.md</text>
  <text class="path" x="402" y="569">RUN_STATE.md</text>

  <rect class="node check" x="725" y="458" width="300" height="154"/>
  <text class="node-title" x="747" y="486">校验恢复条件</text>
  <text class="node-sub" x="747" y="512">当前 Git commit 与工作区</text>
  <text class="node-sub" x="747" y="535">物料指纹是否变化</text>
  <text class="node-sub" x="747" y="558">活动任务是否唯一</text>
  <text class="node-sub" x="747" y="581">骨架门禁与现场归属</text>

  <rect class="node check" x="1110" y="470" width="270" height="130"/>
  <text class="node-title" x="1132" y="498">检查点是否有效?</text>
  <text class="node-sub" x="1132" y="525">有效：按阶段续跑</text>
  <text class="node-sub" x="1132" y="548">无检查点：选择下一任务</text>
  <text class="node-sub" x="1132" y="571">冲突：阻塞或重规划</text>

  <path class="arrow" d="M300 535 C330 535, 350 535, 380 535"/>
  <path class="arrow" d="M640 535 C670 535, 695 535, 725 535"/>
  <path class="arrow" d="M1025 535 C1055 535, 1080 535, 1110 535"/>

  <rect class="lane" x="54" y="690" width="1572" height="270"/>
  <text class="lane-title" x="84" y="728">3. 阶段级恢复与状态同步</text>

  <rect class="node run" x="90" y="790" width="230" height="112"/>
  <text class="node-title" x="112" y="818">IMPLEMENTING</text>
  <text class="node-sub" x="112" y="844">[IN_PROGRESS]</text>
  <text class="node-sub" x="112" y="868">恢复已修改文件与步骤</text>

  <rect class="node run" x="405" y="790" width="230" height="112"/>
  <text class="node-title" x="427" y="818">VERIFYING</text>
  <text class="node-sub" x="427" y="844">[VERIFYING]</text>
  <text class="node-sub" x="427" y="868">续跑未完成验证命令</text>

  <rect class="node run" x="720" y="790" width="230" height="112"/>
  <text class="node-title" x="742" y="818">REVIEWING</text>
  <text class="node-sub" x="742" y="844">[REVIEWING]</text>
  <text class="node-sub" x="742" y="868">确认验证证据后审查</text>

  <rect class="node blocked" x="1035" y="790" width="230" height="112"/>
  <text class="node-title" x="1057" y="818">BLOCKED</text>
  <text class="node-sub" x="1057" y="844">[BLOCKED]</text>
  <text class="node-sub" x="1057" y="868">展示原因与恢复命令</text>

  <rect class="node check" x="1350" y="790" width="230" height="112"/>
  <text class="node-title" x="1372" y="818">物料已变化</text>
  <text class="node-sub" x="1372" y="844">标记 [CHANGED]</text>
  <text class="node-sub" x="1372" y="868">清除旧结论并重规划</text>

  <path class="ok" d="M1245 600 C1245 690, 205 690, 205 790"/>
  <path class="ok" d="M1245 600 C1245 710, 520 710, 520 790"/>
  <path class="ok" d="M1245 600 C1245 730, 835 730, 835 790"/>
  <path class="warn" d="M1245 600 C1245 700, 1150 700, 1150 790"/>
  <path class="warn" d="M1245 600 C1245 680, 1465 680, 1465 790"/>

  <rect class="lane" x="54" y="996" width="1572" height="130"/>
  <text class="lane-title" x="84" y="1034">4. 完成、暂停和下一任务</text>

  <rect class="node done" x="130" y="1055" width="260" height="50"/>
  <text class="node-title" x="152" y="1086">审查通过 → [x]</text>

  <rect class="node memory" x="500" y="1055" width="300" height="50"/>
  <text class="node-title" x="522" y="1086">同步三层状态 / 骨架状态</text>

  <rect class="node run" x="910" y="1055" width="270" height="50"/>
  <text class="node-title" x="932" y="1086">骨架后人工确认 / 下一任务</text>

  <rect class="node done" x="1290" y="1055" width="250" height="50"/>
  <text class="node-title" x="1312" y="1086">全部完成 → READY_TO_RELEASE</text>

  <path class="ok" d="M835 902 C835 970, 260 970, 260 1055"/>
  <path class="arrow" d="M390 1080 C425 1080, 465 1080, 500 1080"/>
  <path class="arrow" d="M800 1080 C835 1080, 875 1080, 910 1080"/>
  <path class="ok" d="M1180 1080 C1215 1080, 1255 1080, 1290 1080"/>
  <path class="soft" d="M1045 1055 C1045 980, 195 980, 195 578"/>

  <text class="small" x="72" y="1158">核心原则：STATUS.md 额外记录骨架门禁；PENDING/BLOCKED/STALE 不放行普通任务，READY 后仍需用户手动启动。</text>
</svg>
